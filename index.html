<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quirgs | System Update</title>
    <style>
        :root {
            --bg-color: #09090b;
            --term-bg: #18181b;
            --term-border: #27272a;
            --text-main: #a1a1aa;
            --text-bright: #f4f4f5;
            --accent-green: #4ade80;
            --accent-blue: #60a5fa;
            --accent-red: #f87171;
            --accent-yellow: #facc15;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-wrapper {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .logo {
            width: 96px;
            margin-top: 32px;
        }

        .terminal-container {
            width: 100%;
            max-width: 800px;
            background-color: var(--term-bg);
            border: 1px solid var(--term-border);
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .terminal-header {
            background-color: #09090b;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--term-border);
        }

        .mac-btns {
            display: flex;
            gap: 8px;
        }

        .mac-btn {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .close {
            background-color: #ff5f56;
        }

        .minimize {
            background-color: #ffbd2e;
        }

        .maximize {
            background-color: #27c93f;
        }

        .terminal-title {
            flex-grow: 1;
            text-align: center;
            color: #71717a;
            font-size: 0.85rem;
            margin-right: 60px;
            /* offset for buttons to keep text centered */
        }

        .terminal-body {
            padding: 24px;
            font-size: 0.95rem;
            line-height: 1.6;
            min-height: 400px;
            overflow-y: auto;
        }

        .line {
            margin-bottom: 8px;
            display: flex;
            flex-wrap: wrap;
        }

        .prompt {
            color: var(--accent-green);
            margin-right: 8px;
            font-weight: bold;
        }

        .path {
            color: var(--accent-blue);
            margin-right: 8px;
        }

        .text-red {
            color: var(--accent-red);
        }

        .text-yellow {
            color: var(--accent-yellow);
        }

        .text-bright {
            color: var(--text-bright);
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: var(--text-bright);
            vertical-align: bottom;
            animation: blink 1s step-end infinite;
            margin-left: 2px;
        }

        .hidden {
            display: none;
        }

        a {
            color: var(--accent-blue);
            text-decoration: none;
            border-bottom: 1px dashed var(--accent-blue);
            transition: color 0.2s, border-color 0.2s;
        }

        a:hover {
            color: var(--accent-green);
            border-color: var(--accent-green);
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="main-wrapper">
        <div class="terminal-container">
            <div class="terminal-header">
                <div class="mac-btns">
                    <div class="mac-btn close"></div>
                    <div class="mac-btn minimize"></div>
                    <div class="mac-btn maximize"></div>
                </div>
                <div class="terminal-title">admin@quirgs: ~</div>
            </div>
            <div class="terminal-body" id="terminal">
                <!-- Content will be injected by JavaScript -->
            </div>
        </div>
        <img src="assets/logo.png" alt="Quirgs Logo" class="logo">
    </div>

    <script>
        // Terminal text sequence
        const sequence = [
            { type: 'input', text: './shutdown_v1.sh' },
            { type: 'output', text: '[INFO] Initiating deprecation sequence for Legacy Quirgs...', delay: 500 },
            { type: 'output', text: '<span class="text-yellow">[WARN] Static reference guides and human-written SOPs offline.</span>', delay: 800 },
            { type: 'output', text: '<span class="text-bright">[SYSTEM] Reasoning models detected. Adapting ecosystem...</span>', delay: 1200 },
            { type: 'output', text: '<span class="text-red">[OK] Legacy infrastructure successfully archived.</span>', delay: 500 },
            { type: 'blank', delay: 400 },
            { type: 'input', text: './init_v2_pivot.sh --concept=stealth' },
            { type: 'output', text: '[BUILDING] Constructing AI-native command center...', delay: 800 },
            { type: 'output', text: '[BUILDING] Compiling generative scaffolding and developer contexts...', delay: 1000 },
            { type: 'blank', delay: 300 },
            { type: 'output', text: '<span class="text-bright">QUIRGS V2 is currently in development.</span>', delay: 400 },
            { type: 'output', text: 'We are re-imagining our concept from the ground up to support the open-source community with tooling built for the age of thinking models.', delay: 400 },
            { type: 'blank', delay: 200 },
            { type: 'output', text: 'Follow the commit history or get in touch: <a href="https://github.com/unqdlphn/quirgs" target="_blank"> GitHub</a>', delay: 0 },
            { type: 'prompt-only' }
        ];

        const terminal = document.getElementById('terminal');
        let currentStep = 0;

        function getPromptHTML() {
            return `<span class="prompt">admin@quirgs</span><span class="path">~/system</span><span class="text-bright">$</span> `;
        }

        async function typeText(element, text, speed = 30) {
            return new Promise(resolve => {
                let i = 0;
                // Temporarily remove HTML tags for typing effect, or just insert HTML directly if it contains tags
                if (text.includes('<span') || text.includes('<a')) {
                    element.innerHTML += text;
                    setTimeout(resolve, speed * 10);
                } else {
                    function type() {
                        if (i < text.length) {
                            element.innerHTML += text.charAt(i);
                            i++;
                            setTimeout(type, speed);
                        } else {
                            resolve();
                        }
                    }
                    type();
                }
            });
        }

        async function runSequence() {
            for (const step of sequence) {
                const line = document.createElement('div');
                line.className = 'line';

                if (step.type === 'input') {
                    line.innerHTML = getPromptHTML();
                    const textSpan = document.createElement('span');
                    line.appendChild(textSpan);

                    // Add cursor to current line
                    const cursor = document.createElement('span');
                    cursor.className = 'cursor';
                    line.appendChild(cursor);

                    terminal.appendChild(line);

                    await new Promise(r => setTimeout(r, 600)); // Pause before typing
                    await typeText(textSpan, step.text, 50);
                    await new Promise(r => setTimeout(r, 400)); // Pause after typing

                    // Remove cursor
                    line.removeChild(cursor);
                }
                else if (step.type === 'output') {
                    terminal.appendChild(line);
                    await typeText(line, step.text, 0); // Fast output
                }
                else if (step.type === 'blank') {
                    line.innerHTML = '&nbsp;';
                    terminal.appendChild(line);
                }
                else if (step.type === 'prompt-only') {
                    line.innerHTML = getPromptHTML();
                    const cursor = document.createElement('span');
                    cursor.className = 'cursor';
                    line.appendChild(cursor);
                    terminal.appendChild(line);
                }

                // Scroll to bottom
                terminal.scrollTop = terminal.scrollHeight;

                // Wait for specified delay
                if (step.delay) {
                    await new Promise(r => setTimeout(r, step.delay));
                }
            }
        }

        // Start animation after a brief initial pause
        setTimeout(runSequence, 1000);
    </script>
</body>

</html>
