<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Page background -->
  <rect width="1200" height="630" fill="#09090b"/>

  <!-- Terminal window -->
  <rect x="70" y="60" width="1060" height="510" rx="10" fill="#18181b" stroke="#27272a" stroke-width="2"/>

  <!-- Title bar (matches site .terminal-header: #09090b bg, mac dots, centered title, [&#8801;] [?] right) -->
  <path d="M 80 60 h 1040 a 10 10 0 0 1 10 10 v 42 H 70 v -42 a 10 10 0 0 1 10 -10 z" fill="#09090b"/>
  <line x1="71" y1="112" x2="1129" y2="112" stroke="#27272a" stroke-width="1.5"/>
  <circle cx="106" cy="86" r="9" fill="#ff5f56"/>
  <circle cx="134" cy="86" r="9" fill="#ffbd2e"/>
  <circle cx="162" cy="86" r="9" fill="#27c93f"/>
  <text x="600" y="93" font-family="JetBrains Mono" font-size="20" fill="#a1a1aa" text-anchor="middle">admin@quirgs: ~</text>
  <text x="1100" y="93" font-family="JetBrains Mono" font-size="20" fill="#a1a1aa" text-anchor="end">[&#8801;] [?]</text>

  <!-- Prompt line 1 -->
  <text x="112" y="172" font-family="JetBrains Mono" font-size="24">
    <tspan fill="#4ade80">admin@quirgs</tspan><tspan fill="#60a5fa"> ~/system</tspan><tspan fill="#f4f4f5"> $ cat README.md</tspan>
  </text>

  <!-- Wordmark -->
  <text x="112" y="268" font-family="JetBrains Mono" font-weight="bold" font-size="76" fill="#f4f4f5">Quirgs</text>

  <!-- Tagline -->
  <text x="112" y="330" font-family="JetBrains Mono" font-weight="bold" font-size="34" fill="#4ade80">Governance first. Build accordingly.</text>

  <!-- Description -->
  <text x="112" y="388" font-family="JetBrains Mono" font-size="23" fill="#a1a1aa">AI governance skills for teams building responsibly.</text>

  <!-- Bundle line -->
  <text x="112" y="452" font-family="JetBrains Mono" font-size="23">
    <tspan fill="#facc15">[BUNDLE]</tspan><tspan fill="#a1a1aa"> quirgs-compliance  </tspan><tspan fill="#f4f4f5">7 skills</tspan>
  </text>

  <!-- Prompt line with cursor -->
  <text x="112" y="522" font-family="JetBrains Mono" font-size="24">
    <tspan fill="#4ade80">admin@quirgs</tspan><tspan fill="#60a5fa"> ~/system</tspan><tspan fill="#f4f4f5"> $ </tspan>
  </text>
  <rect x="472" y="502" width="14" height="26" fill="#f4f4f5"/>

  <!-- URL below terminal -->
  <text x="600" y="608" font-family="JetBrains Mono" font-size="22" fill="#a1a1aa" text-anchor="middle">quirgs.com</text>
</svg>
