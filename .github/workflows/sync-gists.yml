name: Sync Skills to Gists

on:
  push:
    branches: [main]
    paths:
      - 'skills/*/SKILL.md'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sync changed SKILL.md files to Gists
        env:
          GIST_TOKEN: ${{ secrets.GIST_SYNC_TOKEN }}
          GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/sync-gists.js
