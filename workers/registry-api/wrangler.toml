name = "quirgs-registry-api"
main = "index.js"
compatibility_date = "2024-01-01"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
invocation_logs = true

# Custom domain — Cloudflare auto-provisions the DNS record and TLS cert on deploy.
routes = [
  { pattern = "api.quirgs.com", custom_domain = true }
]

# Keep the *.workers.dev hostname live alongside the custom domain. Without this,
# adding a custom_domain route makes wrangler DISABLE workers.dev by default — a
# hard cutover that breaks any existing *.workers.dev references during transition.
workers_dev = true

[[kv_namespaces]]
binding = "QUIRGS_REGISTRY"
id = "ab23c8017bc846ae96253e1c2207d716"
