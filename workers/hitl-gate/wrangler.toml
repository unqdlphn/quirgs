name = "quirgs-hitl-gate"
main = "index.js"
compatibility_date = "2024-01-01"

# Custom domain — Cloudflare auto-provisions the DNS record and TLS cert on deploy.
routes = [
  { pattern = "gate.quirgs.com", custom_domain = true }
]

# Keep the *.workers.dev hostname live alongside the custom domain. Without this,
# adding a custom_domain route makes wrangler DISABLE workers.dev by default — which
# would kill the live shared demo gate (quirgs-hitl-gate.*.workers.dev) still
# referenced on main until #98 merges.
workers_dev = true

# Browser origins permitted to call the gate. Server-to-server callers (curl,
# agents) send no Origin and are unaffected. HITL_WRITE_TOKEN is a secret —
# set it with: wrangler secret put HITL_WRITE_TOKEN --config workers/hitl-gate/wrangler.toml
#
# 2026-07-08: briefly widened this to admit cowork-artifact://local and null
# to let the quirgs-site-maintenance Cowork artifact call this Worker directly
# (closing risk R-012 on the AI Risk Register the "right" way). Reverted same
# day — confirmed via a live diagnostic that Cowork artifacts cannot make
# outbound fetch() calls to ANY external domain (a wildcard-CORS test site
# failed identically to this Worker), so the widening had no achievable
# benefit and only added CORS surface (any null-origin or local-artifact page
# would have passed the browser check — HITL_WRITE_TOKEN was always the real
# boundary, but no reason to widen this for nothing). R-012 is closed instead
# by removing the write path from the artifact entirely: it now reads D1
# read-only for visibility and links to quirgs.com/review/ (a real browser
# page) for actual approve/reject actions.
[vars]
ALLOWED_ORIGINS = "https://quirgs.com,https://www.quirgs.com"

# Daily sweep: archive events older than 30 days, then hard-delete rows archived
# more than 60 days ago (bounded retention — see risk R-007 in the governance
# risk register before changing).
[triggers]
crons = ["0 3 * * *"]

[[d1_databases]]
binding = "HITL_DB"
database_name = "quirgs-hitl-db"
database_id = "11d74f61-cffe-4830-9ca2-f8f6bb5e1c68"
migrations_dir = "migrations"

# Cloudflare Email Service — sends via the notify.quirgs.com subdomain (see
# DNS setup, 2026-07-09). Apex quirgs.com keeps its null-mail hardening;
# this binding only ever sends from notify.quirgs.com addresses.
[[send_email]]
name = "EMAIL"

