name = "quirgs-hitl-gate"
main = "index.js"
compatibility_date = "2024-01-01"

# Browser origins permitted to call the gate. Server-to-server callers (curl,
# agents) send no Origin and are unaffected. HITL_WRITE_TOKEN is a secret —
# set it with: wrangler secret put HITL_WRITE_TOKEN --config workers/hitl-gate/wrangler.toml
[vars]
ALLOWED_ORIGINS = "https://quirgs.com,https://www.quirgs.com"

# Daily 30-day TTL archive sweep (replaces the old write-on-read TTL).
[triggers]
crons = ["0 3 * * *"]

[[d1_databases]]
binding = "HITL_DB"
database_name = "quirgs-hitl-db"
database_id = "11d74f61-cffe-4830-9ca2-f8f6bb5e1c68"
migrations_dir = "migrations"
